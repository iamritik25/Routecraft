[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Run with: pytest              (basic)
# Run with: pytest --cov .      (with coverage report)
addopts = -v --tb=short

[coverage:run]
omit =
    tests/*
    */__pycache__/*
    .venv/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.
